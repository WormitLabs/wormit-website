  - generic [ref=f6e275]:
    - paragraph [ref=f6e276]: "[ Frequently Asked Questions ]"
    - generic [ref=f6e277]:
      - generic [ref=f6e278]:
        - button "How long does a typical project take?" [ref=f6e279]:
          - generic [ref=f6e280]: How long does a typical project take?
          - img [ref=f6e282]
        - region:
          - paragraph [ref=f6e283]: Brand identity projects usually run 3–5 weeks. Product design and websites range from 4–10 weeks depending on scope. We define timelines clearly before work begins — no open-ended engagements.
      - generic [ref=f6e284]:
        - button "Do you handle development, or just design?" [ref=f6e285]:
          - generic [ref=f6e286]: Do you handle development, or just design?
          - img [ref=f6e288]
        - region:
          - paragraph [ref=f6e289]: We specialise in design — brand identity, product UI, and web. For development, we partner with trusted engineers and can coordinate the full handoff, so your files never sit in limbo.
      - generic [ref=f6e290]:
        - button "What's the difference between a retainer and a project contract?" [ref=f6e291]:
          - generic [ref=f6e292]: What's the difference between a retainer and a project contract?
          - img [ref=f6e294]
        - region:
          - paragraph [ref=f6e295]: "A project contract is scoped and delivered once — fixed deliverables, fixed cost. A monthly retainer means we're your ongoing design partner: dedicated hours each month, faster turnaround, and no re-briefing overhead."
      - generic [ref=f6e296]:
        - button "What do I need to provide to get started?" [ref=f6e297]:
          - generic [ref=f6e298]: What do I need to provide to get started?
          - img [ref=f6e300]
        - region:
          - paragraph [ref=f6e301]: Not much. A brief conversation is enough. We'll ask about your goals, timeline, budget, and any references you love. From there we send a proposal within 48 hours.
      - generic [ref=f6e302]:
        - button "Do you work with early-stage startups?" [ref=f6e303]:
          - generic [ref=f6e304]: Do you work with early-stage startups?
          - img [ref=f6e306]
        - region:
          - paragraph [ref=f6e307]: Yes — and some of our best work has come from pre-revenue founders. We don't just push pixels; we help shape the story and the system from the ground up.
      - generic [ref=f6e308]:
        - button "What happens after the project is delivered?" [ref=f6e309]:
          - generic [ref=f6e310]: What happens after the project is delivered?
          - img [ref=f6e312]
        - region:
          - paragraph [ref=f6e313]: Every project includes a post-delivery support window (2–4 weeks). We're available for questions, tweaks, and guidance as you roll things out. Retainer clients simply continue.
